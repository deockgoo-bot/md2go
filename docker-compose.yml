services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hwpconverter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hwpbridge}
      POSTGRES_USER: ${POSTGRES_USER:-hwpbridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hwpbridge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hwpconverter-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hwpconverter-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hwpbridge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hwpbridge}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /tmp/hwpconverter:/tmp/hwpconverter
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hwpconverter-worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hwpbridge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hwpbridge}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /tmp/hwpconverter:/tmp/hwpconverter
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
